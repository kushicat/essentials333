<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BB AD Spelling Drill</title>
<style>
  :root{
    --ink:#1b3fa0; --ink-d:#142e78; --paper:#f7f7f4; --card:#ffffff;
    --line:#e3e3dc; --text:#1c1c1a; --muted:#6b6b63;
    --ok:#15803d; --ok-bg:#dcfce7; --ok-br:#86efac;
    --no:#b91c1c; --no-bg:#fee2e2; --no-br:#fca5a5;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--paper); color:var(--text); line-height:1.45;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:640px;margin:0 auto;padding:16px}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}

  /* header */
  header{position:sticky;top:0;z-index:10;background:var(--paper);
    border-bottom:2px solid var(--ink);}
  .hbar{max-width:640px;margin:0 auto;padding:10px 16px;display:flex;
    align-items:center;justify-content:space-between;gap:12px}
  .brand{font-weight:800;letter-spacing:-.02em;font-size:17px;color:var(--ink)}
  .brand small{display:block;font-weight:600;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted)}
  .progress{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden;display:none}
  .progress.show{display:block}
  .progress i{display:block;height:100%;width:0;background:var(--ink);transition:width .25s}
  .score{font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;white-space:nowrap}
  .score .g{color:var(--ok)} .score .b{color:var(--no)}

  h1{font-size:22px;letter-spacing:-.02em;margin:18px 0 4px}
  .sub{color:var(--muted);margin:0 0 18px;font-size:14px}
  .label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);font-weight:700;margin:18px 0 8px}

  .grid{display:grid;gap:8px}
  .grid.two{grid-template-columns:1fr 1fr}
  .grid.three{grid-template-columns:1fr 1fr 1fr}
  .chip{border:1.5px solid var(--line);background:var(--card);border-radius:12px;
    padding:12px 10px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;
    transition:.12s;color:var(--text)}
  .chip small{display:block;font-weight:600;color:var(--muted);font-size:11px;margin-top:2px}
  .chip[aria-pressed="true"]{border-color:var(--ink);background:#eef2fc;color:var(--ink-d)}
  .chip:active{transform:scale(.98)}

  .toggle{display:flex;align-items:center;justify-content:space-between;
    border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600}
  .sw{width:44px;height:26px;border-radius:99px;background:var(--line);position:relative;transition:.15s;flex:none;cursor:pointer}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .sw[aria-pressed="true"]{background:var(--ink)} .sw[aria-pressed="true"]::after{left:21px}

  .btn{display:block;width:100%;border:none;border-radius:12px;padding:15px;
    font-size:16px;font-weight:700;cursor:pointer;margin-top:18px;transition:.12s}
  .btn.primary{background:var(--ink);color:#fff}
  .btn.primary:active{background:var(--ink-d)}
  .btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--ink)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* quiz */
  .qmeta{display:flex;justify-content:space-between;align-items:baseline;margin:6px 0 10px}
  .qmeta .n{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .qmeta .tag{font-size:11px;font-weight:700;color:var(--ink);background:#eef2fc;padding:3px 8px;border-radius:99px}
  .qcard{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:18px}
  .qprompt{font-size:15px;font-weight:600;margin:0 0 16px;color:var(--muted)}
  .opts{display:grid;gap:10px}
  .opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);
    background:var(--card);border-radius:12px;padding:14px 16px;cursor:pointer;
    font-size:17px;text-align:left;transition:.1s;width:100%}
  .opt .k{font:700 13px/1 ui-monospace,monospace;color:var(--muted);
    border:1.5px solid var(--line);border-radius:7px;width:24px;height:24px;
    display:flex;align-items:center;justify-content:center;flex:none}
  .opt:active{transform:scale(.99)}
  .opt.correct{border-color:var(--ok-br);background:var(--ok-bg)}
  .opt.correct .k{border-color:var(--ok);color:var(--ok)}
  .opt.wrong{border-color:var(--no-br);background:var(--no-bg)}
  .opt.wrong .k{border-color:var(--no);color:var(--no)}
  .opts.locked .opt{cursor:default}
  .feedback{margin-top:14px;font-size:14px;font-weight:600;min-height:20px}
  .feedback .ok{color:var(--ok)} .feedback .no{color:var(--no)}
  .feedback .corr{color:var(--text);font-weight:500}

  .endbig{font-size:46px;font-weight:800;letter-spacing:-.03em;margin:8px 0 0}
  .endbig.good{color:var(--ok)} .endbig.mid{color:var(--ink)} .endbig.low{color:var(--no)}
  .misslist{margin-top:14px;border:1.5px solid var(--line);border-radius:14px;overflow:hidden}
  .missrow{display:flex;justify-content:space-between;gap:10px;padding:11px 14px;border-top:1px solid var(--line);font-size:14px}
  .missrow:first-child{border-top:none}
  .missrow .you{color:var(--no);text-decoration:line-through}
  .missrow .ans{color:var(--ok);font-weight:700}
  .hint{font-size:12.5px;color:var(--muted);margin-top:10px;text-align:center}
  .hide{display:none!important}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="brand">Spelling Drill<small>BB AD · Ballpoint with Kushal</small></div>
    <div class="progress" id="prog"><i id="progbar"></i></div>
    <div class="score hide" id="score"></div>
  </div>
</header>

<div class="wrap">
  <!-- HOME -->
  <section id="home">
    <h1>Set up your drill</h1>
    <p class="sub">Tap an answer to lock it in — you'll see right away if it's correct. No peeking.</p>

    <div class="label">Which set</div>
    <div class="grid three" id="setPick"></div>

    <div class="label">Which section</div>
    <div class="grid" id="secPick"></div>

    <div class="label">Options</div>
    <div class="grid" style="gap:8px">
      <div class="toggle">Shuffle question order
        <div class="sw" id="swQ" role="button" aria-pressed="true"></div></div>
      <div class="toggle">Shuffle answer positions
        <div class="sw" id="swO" role="button" aria-pressed="true"></div></div>
    </div>

    <button class="btn primary" id="start">Start drill</button>
    <button class="btn ghost hide" id="reviewMissed">Review my missed words</button>
    <p class="hint" id="missCount"></p>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hide">
    <div class="qmeta"><span class="n" id="qn"></span><span class="tag" id="qtag"></span></div>
    <div class="qcard">
      <p class="qprompt" id="qprompt"></p>
      <div class="opts" id="opts"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn primary hide" id="next">Next</button>
    <button class="btn ghost" id="quitQuiz" style="margin-top:10px">End drill</button>
  </section>

  <!-- END -->
  <section id="end" class="hide">
    <div class="label">Result</div>
    <div class="endbig" id="endScore"></div>
    <p class="sub" id="endLine"></p>
    <div id="missWrap"></div>
    <button class="btn primary hide" id="practiceMiss"></button>
    <button class="btn ghost" id="again">Restart this drill</button>
    <button class="btn ghost" id="goHome" style="margin-top:10px">Back to setup</button>
  </section>
</div>

berry"],"correct":"Raspberry"},{"opts":["Surreptitious","Sureptitious","Surreptious","Surrepptitious"],"correct":"Surreptitious"},{"opts":["Tableau","Tablaeu","Tableu","Tablleau"],"correct":"Tableau"},{"opts":["Unctuous","Unctious","Unctuus","Unctuos"],"correct":"Unctuous"},{"opts":["Vichyssoise","Vichysoise","Vichyssoisse","Vichyssoize"],"correct":"Vichyssoise"},{"opts":["Whirlwind","Wirlwind","Whirlwnd","Whirlwynd"],"correct":"Whirlwind"},{"opts":["Xylophone","Xylaphone","Xilophone","Zylophone"],"correct":"Xylophone"},{"opts":["Yeoman","Yoeman","Yeomman","Yeman"],"correct":"Yeoman"}]}];
const SECTIONS = {
  choose:{name:"Choose the correct spelling", tag:"Spelling"},
  spot:{name:"Find the misspelled word", tag:"Spot error"},
  bonus:{name:"Bonus tough words", tag:"Tough"}
};
const LS_KEY = "bbad_missed_v1";

// ---- state ----
let sel = {set:"all", section:"choose", shufQ:true, shufO:true};
let queue=[], idx=0, right=0, wrong=0, missed=[], reviewMode=false;

const $=id=>document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function loadMissed(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){return {};}}
function saveMissed(m){try{localStorage.setItem(LS_KEY,JSON.stringify(m));}catch(e){}}

// ---- build a flat question pool ----
function poolFor(setId, section){
  let out=[];
  SETS.forEach(s=>{
    if(setId!=="all" && s.id!==setId) return;
    const addChoose=(arr,sec)=>arr.forEach((q,i)=>out.push({
      type:"pick", id:s.id+"|"+sec+"|"+q.correct+"|"+i, setId:s.id, sec,
      prompt:"Which spelling is correct?", options:q.opts, correct:q.correct, note:""
    }));
    const addSpot=(arr)=>arr.forEach((q,i)=>out.push({
      type:"pick", id:s.id+"|spot|"+q.answer+"|"+i, setId:s.id, sec:"spot",
      prompt:"Which word is misspelled?", options:q.words, correct:q.answer,
      note:"Correct spelling: "+q.correction
    }));
    if(section==="all"||section==="choose") addChoose(s.choose,"choose");
    if(section==="all"||section==="spot")   addSpot(s.spot);
    if(section==="all"||section==="bonus")  addChoose(s.bonus,"bonus");
  });
  return out;
}

// ---- HOME render ----
function renderSetPick(){
  const el=$("setPick"); el.innerHTML="";
  const mk=(id,label,sub)=>{
    const d=document.createElement("div");
    d.className="chip"; d.setAttribute("aria-pressed", sel.set===id);
    d.innerHTML=label+(sub?'<small>'+sub+'</small>':'');
    d.onclick=()=>{sel.set=id; renderSetPick();};
    el.appendChild(d);
  };
  mk("all","All sets","A–Z · 967");
  SETS.forEach(s=>mk(s.id, s.id, s.range));
}
function renderSecPick(){
  const el=$("secPick"); el.innerHTML="";
  const mk=(id,label,sub)=>{
    const d=document.createElement("div");
    d.className="chip"; d.setAttribute("aria-pressed", sel.section===id);
    d.innerHTML=label+'<small>'+sub+'</small>';
    d.onclick=()=>{sel.section=id; renderSecPick();};
    el.appendChild(d);
  };
  mk("choose","Choose correct","most questions");
  mk("spot","Find misspelled","spot the error");
  mk("bonus","Bonus tough","hardest words");
  mk("all","Everything","all three");
}
function bindToggle(swId, key){
  const sw=$(swId);
  sw.onclick=()=>{sel[key]=!sel[key]; sw.setAttribute("aria-pressed",sel[key]);};
}
function refreshMissedBtn(){
  const m=loadMissed(); const n=Object.keys(m).length;
  if(n>0){ $("reviewMissed").classList.remove("hide");
    $("reviewMissed").textContent="Review my missed words ("+n+")";
    $("missCount").textContent="Missed words are saved on this device as you practise.";
  } else { $("reviewMissed").classList.add("hide"); $("missCount").textContent=""; }
}

// ---- QUIZ flow ----
function startDrill(fromMissed){
  reviewMode=!!fromMissed;
  let pool;
  if(fromMissed){
    const m=loadMissed();
    pool=Object.values(m);
    if(!pool.length) return;
  } else {
    pool=poolFor(sel.set, sel.section);
  }
  queue = sel.shufQ||fromMissed ? shuffle(pool) : pool.slice();
  idx=0; right=0; wrong=0; missed=[];
  $("home").classList.add("hide"); $("end").classList.add("hide");
  $("quiz").classList.remove("hide");
  $("prog").classList.add("show"); $("score").classList.remove("hide");
  showQ();
}

function showQ(){
  const q=queue[idx];
  $("qn").textContent="Question "+(idx+1)+" / "+queue.length;
  $("qtag").textContent = reviewMode ? "Review" : SECTIONS[q.sec].tag + " · " + q.setId;
  $("qprompt").textContent=q.prompt;
  $("feedback").textContent="";
  $("next").classList.add("hide");
  const opts = sel.shufO ? shuffle(q.options) : q.options.slice();
  const box=$("opts"); box.className="opts"; box.innerHTML="";
  opts.forEach((w,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML='<span class="k">'+String.fromCharCode(97+i)+'</span><span class="mono">'+w+'</span>';
    b.onclick=()=>answer(q,w,box);
    box.appendChild(b);
  });
  updateBars();
}

function answer(q, chosen, box){
  if(box.classList.contains("locked")) return;
  box.classList.add("locked");
  const correct = chosen===q.correct;
  [...box.children].forEach(b=>{
    const w=b.querySelector(".mono").textContent;
    if(w===q.correct) b.classList.add("correct");
    else if(w===chosen) b.classList.add("wrong");
  });
  const fb=$("feedback");
  if(correct){ right++; fb.innerHTML='<span class="ok">Correct.</span> '+(q.note?'<span class="corr">'+q.note+'</span>':''); }
  else{
    wrong++;
    missed.push({...q, chosen});
    fb.innerHTML='<span class="no">Not quite.</span> <span class="corr">Answer: <b>'+q.correct+'</b>'+(q.note?' — '+q.note:'')+'</span>';
    // persist miss
    const m=loadMissed(); m[q.id]=q; saveMissed(m);
  }
  // if reviewing and got it right, remove from saved misses
  if(reviewMode && correct){ const m=loadMissed(); delete m[q.id]; saveMissed(m); }
  $("score").innerHTML='<span class="g">'+right+'</span> / <span class="b">'+wrong+'</span>';
  $("next").classList.remove("hide");
  $("next").textContent = idx+1<queue.length ? "Next" : "See result";
  $("next").focus();
}

function updateBars(){
  $("progbar").style.width = (idx/queue.length*100)+"%";
  $("score").innerHTML='<span class="g">'+right+'</span> / <span class="b">'+wrong+'</span>';
}

function nextQ(){
  idx++;
  if(idx>=queue.length) return endDrill();
  showQ();
}

function endDrill(){
  $("quiz").classList.add("hide"); $("prog").classList.remove("show");
  $("end").classList.remove("hide");
  const total=right+wrong, pct= total? Math.round(right/total*100):0;
  const big=$("endScore");
  big.textContent=pct+"%";
  big.className="endbig "+(pct>=85?"good":pct>=60?"mid":"low");
  $("endLine").textContent= right+" right · "+wrong+" wrong out of "+total+(reviewMode?" (review)":"");
  // miss list
  const wrap=$("missWrap"); wrap.innerHTML="";
  if(missed.length){
    const lbl=document.createElement("div"); lbl.className="label"; lbl.textContent="Words to revisit";
    wrap.appendChild(lbl);
    const list=document.createElement("div"); list.className="misslist";
    missed.forEach(q=>{
      const r=document.createElement("div"); r.className="missrow";
      r.innerHTML='<span class="mono you">'+q.chosen+'</span><span class="mono ans">'+q.correct+'</span>';
      list.appendChild(r);
    });
    wrap.appendChild(list);
  }
  const m=loadMissed(); const savedN=Object.keys(m).length;
  const pm=$("practiceMiss");
  if(savedN>0){ pm.classList.remove("hide"); pm.textContent="Practise all saved misses ("+savedN+")"; }
  else pm.classList.add("hide");
}

// keyboard: 1-4 to answer, Enter/Space to advance
document.addEventListener("keydown",e=>{
  if($("quiz").classList.contains("hide")) return;
  if(["1","2","3","4"].includes(e.key)){
    const b=$("opts").children[+e.key-1]; if(b) b.click();
  } else if((e.key==="Enter"||e.key===" ") && !$("next").classList.contains("hide")){
    e.preventDefault(); nextQ();
  }
});

// wire up
renderSetPick(); renderSecPick();
bindToggle("swQ","shufQ"); bindToggle("swO","shufO");
refreshMissedBtn();
$("start").onclick=()=>startDrill(false);
$("reviewMissed").onclick=()=>startDrill(true);
$("next").onclick=nextQ;
$("quitQuiz").onclick=endDrill;
$("again").onclick=()=>startDrill(reviewMode);
$("goHome").onclick=()=>{ $("end").classList.add("hide"); $("quiz").classList.add("hide");
  $("home").classList.remove("hide"); $("score").classList.add("hide"); refreshMissedBtn(); };
$("practiceMiss").onclick=()=>startDrill(true);
</script>
</body>
