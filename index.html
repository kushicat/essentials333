:root{
  --ink:#1b3a8f; --ink-2:#2b50c8; --ink-soft:#e7ecfb;
  --paper:#f7f5ef; --card:#ffffff; --rule:#e9e3d6;
  --text:#181818; --muted:#71706a;
  --good:#1f7a4d; --good-bg:#eaf6ef; --good-line:#bfe3cd;
  --bad:#b8341f; --bad-bg:#fcefec; --bad-line:#f1cabf;
  --radius:14px; --shadow:0 1px 2px rgba(20,30,60,.06),0 8px 30px rgba(20,30,60,.06);
  --serif:"Lexend Variable","Lexend",-apple-system,"Segoe UI",sans-serif;
  --sans:"Lexend Variable","Lexend",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper);
  color:var(--text);
  font-family:var(--sans);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
#wrap{max-width:780px;margin:0 auto;padding:20px 16px 80px}

/* Header */
header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
  padding-bottom:14px;margin-bottom:18px;border-bottom:2px solid var(--ink)}
.brandmark{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--ink-2);margin:0 0 3px;display:flex;align-items:baseline;gap:7px}
.brandmark .tagline{font-weight:500;letter-spacing:.02em;text-transform:none;color:var(--muted);font-size:11px}
.brand h1{font-family:var(--serif);font-size:25px;line-height:1.1;margin:0;letter-spacing:-.005em;font-weight:700}
.brand h1 .em{color:var(--ink)}
.brand .sub{font-size:12.5px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums}
.timer{font-family:var(--mono);font-size:13px;color:var(--ink);background:var(--ink-soft);
  padding:7px 11px;border-radius:999px;white-space:nowrap;font-weight:600}

/* Stats */
#stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:9px 8px;text-align:center}
.stat .v{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink);line-height:1}
.stat .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:5px}

/* Progress */
#progress{margin-bottom:16px;display:grid;gap:10px}
.pbar-row .lab{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:4px}
.pbar{height:8px;background:#ece8de;border-radius:999px;overflow:hidden}
.pbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--ink),var(--ink-2));
  border-radius:999px;transition:width .35s ease}
.pbar.overall > i{background:linear-gradient(90deg,#243f95,#3a63de)}

/* Nav */
#nav{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:18px}
.btn{font-family:var(--sans);font-size:13.5px;font-weight:600;border:1px solid var(--ink);
  background:var(--card);color:var(--ink);padding:8px 13px;border-radius:9px;cursor:pointer;
  transition:background .15s,color .15s}
.btn:hover{background:var(--ink-soft)}
.btn:disabled{opacity:.4;cursor:not-allowed;background:var(--card)}
.btn.solid{background:var(--ink);color:#fff}
.btn.solid:hover{background:var(--ink-2)}
.btn.ghost{border-color:var(--rule);color:var(--muted)}
.btn.ghost:hover{background:#f0ede4;color:var(--text)}
.spacer{flex:1 1 auto}
select.batchsel{font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink);
  border:1px solid var(--ink);background:var(--card);padding:8px 10px;border-radius:9px;cursor:pointer}
.pill{font-size:11px;color:#fff;background:var(--bad);border-radius:999px;padding:1px 7px;margin-left:5px;font-family:var(--mono)}

/* Card / notebook signature */
.card{position:relative;background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:24px 26px 22px 30px;overflow:hidden}
.card::before{content:"";position:absolute;left:14px;top:0;bottom:0;width:2px;background:var(--ink);opacity:.55}
.qmeta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.qnum{font-family:var(--mono);font-size:12px;color:var(--muted)}
.badge{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);
  background:var(--ink-soft);padding:4px 9px;border-radius:7px}
.prompt{font-size:18px;line-height:1.5;margin:2px 0 18px}
.prompt b{color:var(--ink)}
.cloze{margin-top:10px;font-family:var(--serif);font-size:18.5px;background:#fbfaf6;border:1px dashed var(--rule);
  border-radius:10px;padding:13px 15px}
.defq{font-family:var(--serif);font-style:italic;color:var(--ink)}

.opts{display:grid;gap:9px}
.opt{display:flex;gap:11px;align-items:flex-start;text-align:left;width:100%;
  font-family:var(--sans);font-size:15.5px;line-height:1.4;color:var(--text);
  background:var(--card);border:1.5px solid var(--rule);border-radius:11px;padding:12px 14px;cursor:pointer;
  transition:border-color .12s,background .12s}
.opt:hover:not(:disabled){border-color:var(--ink);background:#fafbff}
.opt .key{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);
  border:1.5px solid var(--ink-soft);background:var(--ink-soft);border-radius:6px;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex:0 0 24px;margin-top:1px}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--good-line);background:var(--good-bg)}
.opt.correct .key{background:var(--good);border-color:var(--good);color:#fff}
.opt.wrong{border-color:var(--bad-line);background:var(--bad-bg)}
.opt.wrong .key{background:var(--bad);border-color:var(--bad);color:#fff}
.opt .mark{margin-left:auto;font-weight:800;font-size:16px}
.opt.correct .mark{color:var(--good)}
.opt.wrong .mark{color:var(--bad)}

/* Feedback */
.fb{margin-top:16px;border-radius:12px;padding:15px 16px;border:1px solid var(--rule);background:#fbfaf6}
.fb.ok{border-color:var(--good-line);background:var(--good-bg)}
.fb.no{border-color:var(--bad-line);background:var(--bad-bg)}
.fb .verdict{font-weight:800;font-size:15px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.fb.ok .verdict{color:var(--good)}
.fb.no .verdict{color:var(--bad)}
.fb .word{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--ink)}
.fb dl{margin:8px 0 0;display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:14px}
.fb dt{color:var(--muted);font-weight:600}
.fb dd{margin:0}
.fb .ex{font-style:italic;color:#33332e}
.card-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* End of batch */
.endcard{text-align:center}
.endcard h2{font-family:var(--serif);font-size:24px;margin:2px 0 4px;color:var(--ink)}
.endcard .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0 6px}
.summary .box{border:1px solid var(--rule);border-radius:11px;padding:14px 8px;background:#fbfaf6}
.summary .box .v{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink)}
.summary .box .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
.endbtns{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:20px}

/* Review */
.rev h2{font-family:var(--serif);color:var(--ink);font-size:22px;margin:0 0 4px}
.rev .item{border:1px solid var(--rule);border-left:3px solid var(--bad);border-radius:10px;
  padding:13px 15px;margin-top:11px;background:#fff}
.rev .rq{font-size:15px;margin-bottom:8px}
.rev .rq b{color:var(--ink)}
.rev .row{font-size:13.5px;margin:2px 0}
.rev .row .lab{display:inline-block;min-width:108px;color:var(--muted)}
.rev .mine{color:var(--bad);font-weight:600}
.rev .right{color:var(--good);font-weight:600}
.rev .mean{color:#33332e;font-style:italic}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:15px}

footer{margin-top:26px;text-align:center;font-size:11.5px;color:#a6a39a}
a{color:var(--ink)}

/* Timer controls */
.timerwrap{display:flex;align-items:center;gap:6px}
.contact-btn{font-family:var(--sans);font-size:12.5px;font-weight:700;color:#fff;background:#1877f2;
  border:none;border-radius:999px;padding:7px 13px;cursor:pointer;text-decoration:none;
  display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s}
.contact-btn:hover{background:#1463d1}
.contact-btn svg{width:14px;height:14px;flex:0 0 14px}
.tbtn{font-family:var(--mono);font-size:12px;font-weight:700;border:1px solid var(--ink);
  background:var(--card);color:var(--ink);width:28px;height:28px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:background .15s}
.tbtn:hover{background:var(--ink-soft)}
.tbtn.run{background:var(--ink);color:#fff}

/* Top-level tabs */
#tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--rule);padding-bottom:0}
.tab{font-family:var(--sans);font-size:14.5px;font-weight:700;border:none;background:none;
  color:var(--muted);padding:9px 16px 11px;cursor:pointer;border-bottom:2.5px solid transparent;
  margin-bottom:-1px;transition:color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--ink);border-bottom-color:var(--ink)}

/* Word Bank */
#bank-search-wrap{position:sticky;top:0;z-index:5;background:var(--paper);padding:6px 0 14px}
.searchbox{position:relative}
.searchbox input{width:100%;font-family:var(--sans);font-size:16px;color:var(--text);
  border:1.5px solid var(--ink);border-radius:11px;padding:13px 42px 13px 16px;background:var(--card);
  box-shadow:var(--shadow)}
.searchbox input:focus{outline:none;border-color:var(--ink-2);box-shadow:0 0 0 3px var(--ink-soft)}
.searchbox .clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;
  color:var(--muted);font-size:20px;cursor:pointer;width:28px;height:28px;border-radius:50%;line-height:1}
.searchbox .clr:hover{background:var(--ink-soft);color:var(--ink)}
.bank-count{font-size:12px;color:var(--muted);margin-top:8px;font-variant-numeric:tabular-nums}
.wcard{position:relative;background:var(--card);border:1px solid var(--rule);border-left:3px solid var(--ink);
  border-radius:11px;padding:15px 17px;margin-bottom:11px}
.wcard .whead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.wcard .ww{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.wcard .wp{font-size:12px;font-style:italic;color:var(--muted)}
.wcard .wd{font-size:15px;margin:7px 0 0;color:#2a2a26}
.wcard .wex{font-size:14px;font-style:italic;color:#4a4a44;margin:9px 0 0;padding-left:11px;border-left:2px solid var(--ink-soft)}
.wcard .syn{display:grid;grid-template-columns:auto 1fr;gap:3px 12px;margin-top:11px;font-size:13.5px}

const BATCH_SIZE = 35;
const POINTS = 10;

/* ---------- helpers ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function rint(n){return Math.floor(Math.random()*n);}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

const byPos={};
WORDS.forEach((w,i)=>{(byPos[w.p]=byPos[w.p]||[]).push(i);});

function distractorWords(idx,k,exclude){
  const pos=WORDS[idx].p;
  let pool=(byPos[pos]||[]).filter(i=>i!==idx);
  if(pool.length<k+2) pool=WORDS.map((_,i)=>i).filter(i=>i!==idx);
  pool=shuffle(pool);
  const ex=new Set(exclude.map(s=>String(s).toLowerCase()));
  const out=[];
  for(const i of pool){const t=WORDS[i].w;const lk=t.toLowerCase();if(!ex.has(lk)){out.push(t);ex.add(lk);}if(out.length>=k)break;}
  return out;
}
function clozeText(idx){
  const w=WORDS[idx];const form=w.b||w.w;
  const re=new RegExp(escRe(form),'i');
  return w.e.replace(re,'\u00a0______\u00a0').trim();
}

/* ---------- question factory ---------- */
function assemble(label,idx,prompt,optTexts,correctText){
  const seen=new Set();const opts=[];
  for(const t of optTexts){const lk=String(t).toLowerCase();if(!seen.has(lk)){seen.add(lk);opts.push({t:t,correct:(t===correctText)});}}
  if(opts.length<4)return null;
  return {label:label,wordIdx:idx,prompt:prompt,options:shuffle(opts.slice(0,4)),cloze:false};
}
function makeQ(idx,type){
  const w=WORDS[idx];
  if(type==='synonym'){
    if(!w.s||!w.s.length)return null;
    const c=w.s[0];
    const ds=distractorWords(idx,3,[c,w.w].concat(w.s||[]));
    if(ds.length<3)return null;
    return assemble('Synonym',idx,'Which word is closest in meaning to <b>'+esc(w.w)+'</b>?',[c].concat(ds),c);
  }
  if(type==='antonym'){
    if(!w.a||!w.a.length)return null;
    const c=w.a[0];
    const ds=distractorWords(idx,3,[c,w.w].concat(w.a||[]).concat(w.s||[]));
    if(ds.length<3)return null;
    return assemble('Antonym',idx,'Which word is most nearly <b>opposite</b> in meaning to <b>'+esc(w.w)+'</b>?',[c].concat(ds),c);
  }
  if(type==='context'||type==='fill'){
    const ds=distractorWords(idx,3,[w.w]);
    if(ds.length<3)return null;
    const head=(type==='context'?'Choose the word that best fits the context:':'Choose the word that best completes the sentence:');
    const q=assemble(type==='context'?'Sentence Context':'Fill in the Blank',idx,head+'<div class="cloze">'+clozeText(idx)+'</div>',[w.w].concat(ds),w.w);
    if(q)q.cloze=true;
    return q;
  }
  if(type==='reverse'){
    const ds=distractorWords(idx,3,[w.w]);
    if(ds.length<3)return null;
    return assemble('Definition',idx,'Which word means: <span class="defq">&ldquo;'+esc(w.d)+'&rdquo;</span>',[w.w].concat(ds),w.w);
  }
  if(type==='usage'){
    const others=shuffle((byPos[w.p]||WORDS.map((_,i)=>i)).filter(i=>i!==idx)).slice(0,8);
    const opts=[{t:w.e,correct:true}];
    for(const o of others){
      if(opts.length>=4)break;
      const ow=WORDS[o];const form=ow.b||ow.w;
      const re=new RegExp('\\b'+escRe(form)+'\\b','i');
      const m=ow.e.match(re);
      if(!m)continue;
      let repl=w.w;
      if(m[0][0]===m[0][0].toUpperCase())repl=cap(w.w);
      opts.push({t:ow.e.replace(re,repl),correct:false});
    }
    if(opts.length<4)return null;
    return {label:'Word Usage',wordIdx:idx,prompt:'In which sentence is <b>'+esc(w.w)+'</b> used correctly?',options:shuffle(opts),cloze:false};
  }
  return null;
}

/* ---------- batch assembly ---------- */
function buildBatch(wordIdxs){
  const qs=[];const usedCloze=new Set();const seenKey=new Set();
  // weighted primary pattern ~ 35% context, 25% syn, 20% ant, 15% fill, 5% reverse
  const pattern=['context','synonym','antonym','context','fill','synonym','context','antonym','reverse','synonym','context','fill','synonym','antonym','context','context','synonym','antonym','fill','reverse'];
  let p=0;
  wordIdxs.forEach(idx=>{
    let placed=false;
    for(let a=0;a<pattern.length+3 && !placed;a++){
      let type=pattern[p%pattern.length];p++;
      if((type==='context'||type==='fill')&&usedCloze.has(idx))type='reverse';
      const key=idx+'|'+type;
      if(seenKey.has(key)&&type!=='usage')continue;
      const q=makeQ(idx,type);
      if(q){qs.push(q);seenKey.add(key);if(q.cloze)usedCloze.add(idx);placed=true;}
    }
    if(!placed){const q=makeQ(idx,'reverse')||makeQ(idx,'context')||makeQ(idx,'synonym');if(q)qs.push(q);}
  });
  // reinforcement up to target
  const target=Math.min(60,Math.max(qs.length,Math.round(wordIdxs.length*1.5)));
  const types=['context','synonym','antonym','fill','reverse','usage'];
  let guard=0;
  while(qs.length<target && guard<target*10){
    guard++;
    const idx=wordIdxs[rint(wordIdxs.length)];
    const type=types[rint(types.length)];
    if((type==='context'||type==='fill')&&usedCloze.has(idx))continue;
    const key=idx+'|'+type;
    if(seenKey.has(key)&&type!=='usage')continue;
    const q=makeQ(idx,type);
    if(q){qs.push(q);seenKey.add(key);if(q.cloze)usedCloze.add(idx);}
  }
  return shuffle(qs);
}

/* ---------- build all batches ---------- */
const BATCHES=[];
for(let i=0;i<WORDS.length;i+=BATCH_SIZE){
  const idxs=[];for(let j=i;j<Math.min(i+BATCH_SIZE,WORDS.length);j++)idxs.push(j);
  BATCHES.push({words:idxs,questions:buildBatch(idxs),a:i,b:Math.min(i+BATCH_SIZE,WORDS.length)});
}
const TOTAL_Q=BATCHES.reduce((s,b)=>s+b.questions.length,0);

/* ---------- state ---------- */
const S={
  b:0,q:0,view:'quiz',
  answers:{},           // 'b:q' -> {choice, correct}
  totals:{answered:0,correct:0,incorrect:0,score:0},
  mistakes:[],          // {b,q}
  retry:{list:[],pos:0,ans:{},correct:0,done:0},
  startTs:Date.now(),
  batchStart:{0:Date.now()},
  batchEndTime:{}
};

/* ---------- timer (start / pause / reset) ---------- */
function fmt(ms){const s=Math.floor(ms/1000);const m=Math.floor(s/60);const r=s%60;return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');}
const T={running:false,elapsed:0,since:0,iv:null};
function timerNow(){return T.elapsed+(T.running?Date.now()-T.since:0);}
function paintTimer(){const el=document.getElementById('timer');if(el)el.textContent=fmt(timerNow());}
function timerStart(){
  if(T.running)return;
  T.running=true;T.since=Date.now();
  T.iv=setInterval(paintTimer,500);
  const b=document.getElementById('tStart');if(b){b.innerHTML='&#10074;&#10074;';b.classList.add('run');b.title='Pause timer';}
}
function timerPause(){
  if(!T.running)return;
  T.elapsed+=Date.now()-T.since;T.running=false;
  clearInterval(T.iv);T.iv=null;paintTimer();
  const b=document.getElementById('tStart');if(b){b.innerHTML='&#9654;';b.classList.remove('run');b.title='Start timer';}
}
function timerToggle(){T.running?timerPause():timerStart();}
function timerReset(){
  clearInterval(T.iv);T.iv=null;T.running=false;T.elapsed=0;T.since=0;
  paintTimer();
  const b=document.getElementById('tStart');if(b){b.innerHTML='&#9654;';b.classList.remove('run');b.title='Start timer';}
}

/* ---------- derived ---------- */
function batchAnswered(b){let n=0;for(const k in S.answers)if(k.indexOf(b+':')===0)n++;return n;}
function batchCorrect(b){let n=0;for(const k in S.answers){if(k.indexOf(b+':')===0&&S.answers[k].correct)n++;}return n;}
function acc(c,a){return a?Math.round(c/a*100):0;}

/* ---------- actions ---------- */
function answer(b,q,ci){
  const key=b+':'+q;if(S.answers[key])return;
  const Q=BATCHES[b].questions[q];
  const correct=!!Q.options[ci].correct;
  S.answers[key]={choice:ci,correct:correct};
  S.totals.answered++;
  if(correct){S.totals.correct++;S.totals.score+=POINTS;}
  else{S.totals.incorrect++;S.mistakes.push({b:b,q:q});}
  render();
}
function nextQ(){
  const qs=BATCHES[S.b].questions;
  if(S.q<qs.length-1){S.q++;}
  else{S.batchEndTime[S.b]=Date.now()-(S.batchStart[S.b]||S.startTs);S.view='batchend';}
  render();
}
function prevQ(){if(S.q>0){S.q--;render();}}
function goBatch(b){
  if(b<0||b>=BATCHES.length)return;
  S.b=b;S.q=0;S.view='quiz';
  if(!S.batchStart[b])S.batchStart[b]=Date.now();
  render();
}
function openReview(){S.view='review';render();}
function startRetry(){
  if(!S.mistakes.length)return;
  S.retry={list:shuffle(S.mistakes.map(m=>({b:m.b,q:m.q}))),pos:0,ans:{},correct:0,done:0};
  S.view='retry';render();
}
function retryAnswer(ci){
  const item=S.retry.list[S.retry.pos];const k=S.retry.pos;
  if(S.retry.ans[k]!==undefined)return;
  const Q=BATCHES[item.b].questions[item.q];
  const correct=!!Q.options[ci].correct;
  S.retry.ans[k]={choice:ci,correct:correct};S.retry.done++;
  if(correct){
    S.retry.correct++;
    // mastered -> remove from mistakes
    S.mistakes=S.mistakes.filter(m=>!(m.b===item.b&&m.q===item.q));
  }
  render();
}
function retryNext(){
  if(S.retry.pos<S.retry.list.length-1){S.retry.pos++;}
  else{S.view='retrydone';}
  render();
}
function resetAll(){
  if(!confirm('Reset all progress, score, and the timer?'))return;
  S.b=0;S.q=0;S.view='quiz';S.answers={};
  S.totals={answered:0,correct:0,incorrect:0,score:0};
  S.mistakes=[];S.startTs=Date.now();S.batchStart={0:Date.now()};S.batchEndTime={};
  timerReset();
  render();
}

/* ---------- render pieces ---------- */
function renderStats(){
  const t=S.totals;
  const html=[
    ['Score',t.score],['Answered',t.answered],['Correct',t.correct],
    ['Incorrect',t.incorrect],['Accuracy',acc(t.correct,t.answered)+'%']
  ].map(p=>'<div class="stat"><div class="v">'+p[1]+'</div><div class="k">'+p[0]+'</div></div>').join('');
  document.getElementById('stats').innerHTML=html;
  document.getElementById('brandsub').textContent='GRE / IBA / GMAT level \u00b7 '+WORDS.length+' words \u00b7 '+TOTAL_Q+' questions \u00b7 by Fahim Faisal Kushal';
}
function renderProgress(){
  const qs=BATCHES[S.b].questions;
  const bdone=batchAnswered(S.b),btot=qs.length;
  const bpct=btot?Math.round(bdone/btot*100):0;
  const opct=TOTAL_Q?Math.round(S.totals.answered/TOTAL_Q*100):0;
  document.getElementById('progress').innerHTML=
    '<div class="pbar-row"><div class="lab"><span>Batch '+(S.b+1)+' progress</span>'
      +'<span>'+bdone+' / '+btot+' \u00b7 '+bpct+'%</span></div>'
      +'<div class="pbar"><i style="width:'+bpct+'%"></i></div></div>'
    +'<div class="pbar-row"><div class="lab"><span>Overall progress</span>'
      +'<span>'+S.totals.answered+' / '+TOTAL_Q+' \u00b7 '+opct+'%</span></div>'
      +'<div class="pbar overall"><i style="width:'+opct+'%"></i></div></div>';
}
function renderNav(){
  let opts='';
  BATCHES.forEach((bt,i)=>{opts+='<option value="'+i+'"'+(i===S.b?' selected':'')+'>Batch '+(i+1)+' (words '+(bt.a+1)+'\u2013'+bt.b+')</option>';});
  const mis=S.mistakes.length;
  document.getElementById('nav').innerHTML=
    '<button class="btn" id="prevB" '+(S.b===0?'disabled':'')+'>&larr; Prev batch</button>'
    +'<select class="batchsel" id="selB">'+opts+'</select>'
    +'<button class="btn" id="nextB" '+(S.b===BATCHES.length-1?'disabled':'')+'>Next batch &rarr;</button>'
    +'<span class="spacer"></span>'
    +'<button class="btn ghost" id="revB">Review mistakes'+(mis?'<span class="pill">'+mis+'</span>':'')+'</button>'
    +'<button class="btn ghost" id="rstB">Reset</button>';
  document.getElementById('prevB').onclick=()=>goBatch(S.b-1);
  document.getElementById('nextB').onclick=()=>goBatch(S.b+1);
  document.getElementById('selB').onchange=e=>goBatch(parseInt(e.target.value,10));
  document.getElementById('revB').onclick=openReview;
  document.getElementById('rstB').onclick=resetAll;
}

function optionRow(Q,ci,answered,chosen){
  const o=Q.options[ci];const keyL=['A','B','C','D'][ci];
  let cls='opt';let mark='';
  if(answered){
    if(o.correct){cls+=' correct';mark='<span class="mark">\u2713</span>';}
    else if(ci===chosen){cls+=' wrong';mark='<span class="mark">\u2717</span>';}
  }
  return '<button class="'+cls+'" '+(answered?'disabled':'')+' data-ci="'+ci+'">'
    +'<span class="key">'+keyL+'</span><span class="otext">'+esc(o.t)+'</span>'+mark+'</button>';
}
function feedbackPanel(Q,chosen){
  const w=WORDS[Q.wordIdx];const correct=Q.options[chosen].correct;
  const correctText=Q.options.find(o=>o.correct).t;
  let h='<div class="fb '+(correct?'ok':'no')+'">';
  h+='<div class="verdict">'+(correct?'\u2713 Correct':'\u2717 Incorrect')+'</div>';
  if(!correct)h+='<div class="row" style="margin-bottom:8px"><b>Correct answer:</b> '+esc(correctText)+'</div>';
  h+='<div class="word">'+esc(w.w)+'</div>';
  h+='<dl>'
    +'<dt>Meaning</dt><dd>'+esc(w.d)+'</dd>'
    +'<dt>Example</dt><dd class="ex">'+esc(w.e)+'</dd>'
    +'<dt>Synonym</dt><dd>'+(w.s&&w.s.length?esc(w.s.join(', ')):'\u2014')+'</dd>'
    +'<dt>Antonym</dt><dd>'+(w.a&&w.a.length?esc(w.a.join(', ')):'\u2014')+'</dd>'
    +'</dl></div>';
  return h;
}

function renderQuiz(){
  const qs=BATCHES[S.b].questions;const Q=qs[S.q];
  const key=S.b+':'+S.q;const ans=S.answers[key];const answered=!!ans;
  let h='<div class="card"><div class="qmeta">'
    +'<span class="qnum">Question '+(S.q+1)+' of '+qs.length+'</span>'
    +'<span class="badge">'+Q.label+'</span></div>';
  h+='<div class="prompt">'+Q.prompt+'</div>';
  h+='<div class="opts" id="opts">';
  for(let i=0;i<Q.options.length;i++)h+=optionRow(Q,i,answered,answered?ans.choice:-1);
  h+='</div>';
  if(answered)h+=feedbackPanel(Q,ans.choice);
  h+='<div class="card-foot">';
  h+='<button class="btn ghost" id="pq" '+(S.q===0?'disabled':'')+'>&larr; Previous</button>';
  if(answered)h+='<button class="btn solid" id="nq">'+(S.q===qs.length-1?'Finish batch':'Next')+' &rarr;</button>';
  else h+='<button class="btn" id="sq">Skip</button>';
  h+='</div></div>';
  const m=document.getElementById('main');m.innerHTML=h;
  if(!answered){
    m.querySelectorAll('.opt').forEach(btn=>{btn.onclick=()=>answer(S.b,S.q,parseInt(btn.dataset.ci,10));});
    const sq=document.getElementById('sq');if(sq)sq.onclick=nextQ;
  }else{const nq=document.getElementById('nq');if(nq)nq.onclick=nextQ;}
  const pq=document.getElementById('pq');if(pq)pq.onclick=prevQ;
}

function renderBatchEnd(){
  const b=S.b;const qs=BATCHES[b].questions;
  const ans=batchAnswered(b),cor=batchCorrect(b);
  const tt=S.batchEndTime[b]||(Date.now()-(S.batchStart[b]||S.startTs));
  const mis=S.mistakes.filter(m=>m.b===b).length;
  let h='<div class="card endcard">'
    +'<h2>Batch '+(b+1)+' complete</h2>'
    +'<div class="sub" style="color:var(--muted);font-size:13px">Words '+(BATCHES[b].a+1)+'\u2013'+BATCHES[b].b+'</div>'
    +'<div class="summary">'
      +'<div class="box"><div class="v">'+(cor*POINTS)+'</div><div class="k">Score</div></div>'
      +'<div class="box"><div class="v">'+acc(cor,ans)+'%</div><div class="k">Accuracy</div></div>'
      +'<div class="box"><div class="v">'+fmt(tt)+'</div><div class="k">Time</div></div>'
      +'<div class="box"><div class="v">'+BATCHES[b].words.length+'</div><div class="k">Words covered</div></div>'
      +'<div class="box"><div class="v">'+ans+' / '+qs.length+'</div><div class="k">Attempted</div></div>'
      +'<div class="box"><div class="v">'+mis+'</div><div class="k">Mistakes</div></div>'
    +'</div><div class="endbtns">'
      +'<button class="btn" id="reB">Review this batch & retry</button>'
      +(mis?'<button class="btn solid" id="rtB">Retry incorrect ('+S.mistakes.length+')</button>':'')
      +(b<BATCHES.length-1?'<button class="btn solid" id="nbB">Next batch &rarr;</button>':'<button class="btn solid" id="reb2">Review all mistakes</button>')
    +'</div></div>';
  document.getElementById('main').innerHTML=h;
  const reB=document.getElementById('reB');if(reB)reB.onclick=openReview;
  const rtB=document.getElementById('rtB');if(rtB)rtB.onclick=startRetry;
  const nbB=document.getElementById('nbB');if(nbB)nbB.onclick=()=>goBatch(b+1);
  const reb2=document.getElementById('reb2');if(reb2)reb2.onclick=openReview;
}

function renderReview(){
  let h='<div class="card rev"><h2>Review mistakes</h2>'
    +'<div class="sub" style="color:var(--muted);font-size:13px;margin-bottom:6px">'+S.mistakes.length+' to review</div>';
  if(!S.mistakes.length){
    h+='<div class="empty">No mistakes recorded yet. Answer some questions \u2014 anything you miss lands here.</div>';
  }else{
    S.mistakes.forEach(m=>{
      const Q=BATCHES[m.b].questions[m.q];const a=S.answers[m.b+':'+m.q];const w=WORDS[Q.wordIdx];
      const mine=a?Q.options[a.choice].t:'\u2014';
      const right=Q.options.find(o=>o.correct).t;
      h+='<div class="item">'
        +'<div class="rq"><span class="badge" style="font-size:10px">'+Q.label+'</span> &nbsp;'+Q.prompt+'</div>'
        +'<div class="row"><span class="lab">Your answer</span> <span class="mine">'+esc(mine)+'</span></div>'
        +'<div class="row"><span class="lab">Correct answer</span> <span class="right">'+esc(right)+'</span></div>'
        +'<div class="row"><span class="lab">'+esc(w.w)+'</span> <span class="mean">'+esc(w.d)+'</span></div>'
        +'</div>';
    });
  }
  h+='<div class="card-foot" style="margin-top:18px">';
  if(S.mistakes.length)h+='<button class="btn solid" id="rtB2">Retry these ('+S.mistakes.length+')</button>';
  h+='<button class="btn ghost" id="bkB">Back to quiz</button></div></div>';
  document.getElementById('main').innerHTML=h;
  const rtB2=document.getElementById('rtB2');if(rtB2)rtB2.onclick=startRetry;
  document.getElementById('bkB').onclick=()=>{S.view='quiz';render();};
}

function renderRetry(){
  const item=S.retry.list[S.retry.pos];const Q=BATCHES[item.b].questions[item.q];
  const a=S.retry.ans[S.retry.pos];const answered=a!==undefined;
  let h='<div class="card"><div class="qmeta">'
    +'<span class="qnum">Retry '+(S.retry.pos+1)+' of '+S.retry.list.length+'</span>'
    +'<span class="badge">'+Q.label+'</span></div>';
  h+='<div class="prompt">'+Q.prompt+'</div><div class="opts">';
  for(let i=0;i<Q.options.length;i++){
    const o=Q.options[i];const keyL=['A','B','C','D'][i];let cls='opt';let mark='';
    if(answered){if(o.correct){cls+=' correct';mark='<span class="mark">\u2713</span>';}else if(i===a.choice){cls+=' wrong';mark='<span class="mark">\u2717</span>';}}
    h+='<button class="'+cls+'" '+(answered?'disabled':'')+' data-ci="'+i+'"><span class="key">'+keyL+'</span><span>'+esc(o.t)+'</span>'+mark+'</button>';
  }
  h+='</div>';
  if(answered)h+=feedbackPanel(Q,a.choice);
  h+='<div class="card-foot">';
  if(answered)h+='<button class="btn solid" id="rnq">'+(S.retry.pos===S.retry.list.length-1?'See results':'Next')+' &rarr;</button>';
  h+='<button class="btn ghost" id="rqx">Exit retry</button></div></div>';
  document.getElementById('main').innerHTML=h;
  if(!answered)document.querySelectorAll('.opt').forEach(b=>{b.onclick=()=>retryAnswer(parseInt(b.dataset.ci,10));});
  const rnq=document.getElementById('rnq');if(rnq)rnq.onclick=retryNext;
  document.getElementById('rqx').onclick=()=>{S.view='quiz';render();};
}

function renderRetryDone(){
  const total=S.retry.list.length;const c=S.retry.correct;
  let h='<div class="card endcard"><h2>Retry complete</h2>'
    +'<div class="summary">'
      +'<div class="box"><div class="v">'+c+' / '+total+'</div><div class="k">Correct</div></div>'
      +'<div class="box"><div class="v">'+acc(c,total)+'%</div><div class="k">Accuracy</div></div>'
      +'<div class="box"><div class="v">'+S.mistakes.length+'</div><div class="k">Still to master</div></div>'
    +'</div>'
    +'<div class="sub" style="color:var(--muted);font-size:13px;margin-top:10px">Questions you got right were cleared from your review list.</div>'
    +'<div class="endbtns">'
      +(S.mistakes.length?'<button class="btn solid" id="rAgain">Retry remaining ('+S.mistakes.length+')</button>':'')
      +'<button class="btn" id="rRev">Open review</button>'
      +'<button class="btn ghost" id="rBack">Back to quiz</button>'
    +'</div></div>';
  document.getElementById('main').innerHTML=h;
  const rAgain=document.getElementById('rAgain');if(rAgain)rAgain.onclick=startRetry;
  document.getElementById('rRev').onclick=openReview;
  document.getElementById('rBack').onclick=()=>{S.view='quiz';render();};
}

function render(){
  renderStats();renderProgress();renderNav();
  if(S.view==='quiz')renderQuiz();
  else if(S.view==='batchend')renderBatchEnd();
  else if(S.view==='review')renderReview();
  else if(S.view==='retry')renderRetry();
  else if(S.view==='retrydone')renderRetryDone();
}
/* ---------- Word Bank ---------- */
const BANK=WORDS.map((w,i)=>({
  i:i,w:w.w,p:w.p,d:w.d,e:w.e,
  s:(w.s||[]),a:(w.a||[]),
  hay:(w.w+' '+w.d+' '+w.e+' '+(w.s||[]).join(' ')+' '+(w.a||[]).join(' ')).toLowerCase()
})).sort((x,y)=>x.w.localeCompare(y.w));

const POS_LABEL={n:'noun',v:'verb',adj:'adjective',adv:'adverb'};

function hl(text,q){
  if(!q)return esc(text);
  const re=new RegExp('('+escRe(q)+')','ig');
  return esc(text).replace(re,'<mark>$1</mark>');
}
function chips(arr,cls,q){
  if(!arr||!arr.length)return '<span class="chip none">none</span>';
  return arr.map(t=>'<span class="chip'+(cls?' '+cls:'')+'">'+hl(t,q)+'</span>').join('');
}
function wordCard(o,q){
  return '<div class="wcard">'
    +'<div class="whead"><span class="ww">'+hl(o.w,q)+'</span>'
      +'<span class="wp">'+(POS_LABEL[o.p]||o.p)+'</span></div>'
    +'<div class="wd">'+hl(o.d,q)+'</div>'
    +'<div class="wex">'+hl(o.e,q)+'</div>'
    +'<dl class="syn">'
      +'<dt>Syn</dt><dd>'+chips(o.s,'',q)+'</dd>'
      +'<dt>Ant</dt><dd>'+chips(o.a,'ant',q)+'</dd>'
    +'</dl></div>';
}
function renderBank(q){
  q=(q||'').trim().toLowerCase();
  const list=q?BANK.filter(o=>o.hay.indexOf(q)>=0):BANK;
  const cnt=document.getElementById('bankCount');
  const box=document.getElementById('bankList');
  if(!list.length){
    cnt.textContent='';
    box.innerHTML='<div class="bank-empty">No match for &ldquo;'+esc(q)+'&rdquo;. Try part of a word, its meaning, or a synonym.</div>';
    return;
  }
  cnt.textContent=q?(list.length+' of '+BANK.length+' words'):(BANK.length+' words \u00b7 A\u2013Z');
  // cap DOM work on huge result sets is unnecessary here (max 333)
  box.innerHTML=list.map(o=>wordCard(o,q)).join('');
}

let bankBuilt=false;
function ensureBank(){if(bankBuilt)return;renderBank('');bankBuilt=true;}

/* ---------- tab switching ---------- */
function setTab(name){
  const drill=document.getElementById('drillView');
  const bank=document.getElementById('bankView');
  const tD=document.getElementById('tabDrill');
  const tB=document.getElementById('tabBank');
  if(name==='bank'){
    drill.style.display='none';bank.style.display='';
    tB.classList.add('active');tD.classList.remove('active');
    ensureBank();
    const inp=document.getElementById('bankSearch');if(inp)inp.focus();
  }else{
    bank.style.display='none';drill.style.display='';
    tD.classList.add('active');tB.classList.remove('active');
  }
}

/* ---------- wiring ---------- */
document.getElementById('tStart').onclick=timerToggle;
document.getElementById('tReset').onclick=timerReset;
document.getElementById('tabDrill').onclick=()=>setTab('drill');
document.getElementById('tabBank').onclick=()=>setTab('bank');

const bankInput=document.getElementById('bankSearch');
const bankClear=document.getElementById('bankClear');
bankInput.addEventListener('input',()=>{
  const v=bankInput.value;
  bankClear.style.display=v?'':'none';
  renderBank(v);
});
bankClear.onclick=()=>{bankInput.value='';bankClear.style.display='none';renderBank('');bankInput.focus();};

paintTimer();
render();
</script>
